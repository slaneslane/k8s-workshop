apiVersion: apps/v1
kind: Deployment
metadata:
  name: crashloop-exit-code
  namespace: qa-troubleshooting
spec:
  replicas: 1
  selector:
    matchLabels:
      app: crashloop-exit-code
  template:
    metadata:
      labels:
        app: crashloop-exit-code
    spec:
      containers:
        - name: app
          image: busybox:1.36
          command: ["sh", "-c"]
          args:
            - |
              echo "Application starting..."
              sleep 2
              echo "Fatal error: application exited with code 1"
              exit 1
