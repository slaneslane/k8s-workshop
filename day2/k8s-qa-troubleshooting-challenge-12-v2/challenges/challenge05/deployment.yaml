apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-05
  namespace: qa-challenge-05
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web-05
  template:
    metadata:
      labels:
        app: web-05
    spec:
      containers:
        - name: nginx
          image: nginx:1.27
          ports:
            - containerPort: 80
