apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-03
  namespace: qa-challenge-03
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web-03
  template:
    metadata:
      labels:
        app: web-03
    spec:
      containers:
        - name: nginx
          image: nginx:1.27
          ports:
            - containerPort: 80
          env:
            - name: APP_MODE
              valueFrom:
                configMapKeyRef:
                  name: web-config
                  key: APP_MODE
