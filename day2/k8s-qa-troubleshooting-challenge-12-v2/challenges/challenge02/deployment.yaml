apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-02
  namespace: qa-challenge-02
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web-02
  template:
    metadata:
      labels:
        app: web-02
    spec:
      containers:
        - name: nginx
          image: nginx:1.27
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "Starting web application..."
              sleep 2
              echo "Fatal error: application failed during startup"
              exit 1
          ports:
            - containerPort: 80
